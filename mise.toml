[tools]
shellcheck = "0.11.0"
shfmt = "3.13.1"
bats = "1.11.0"
lefthook = "1.13.6"
zizmor = "1.25.2"

[settings]
# .bats files are excluded from shellcheck/shfmt: they use bats DSL
# (@test "..." { ... }) which is not valid sh/bash and neither tool parses.

[tasks.fmt]
description = "Format shell scripts in place"
run = "shfmt -w bin/sfp-unlock test/helpers.bash image/build-img.sh image/in-container-img.sh image/live/build-live.sh image/live/in-container-live.sh image/live/auto/config image/live/config/hooks/normal/0100-root-nopasswd.hook.chroot image/live/config/includes.chroot/etc/initramfs-tools/scripts/init-premount/sfp-loop image/live/config/includes.chroot/etc/initramfs-tools/hooks/sfp-loop"

[tasks.fmt-check]
description = "Check shell formatting (CI gate)"
run = "shfmt -d bin/sfp-unlock test/helpers.bash image/build-img.sh image/in-container-img.sh image/live/build-live.sh image/live/in-container-live.sh image/live/auto/config image/live/config/hooks/normal/0100-root-nopasswd.hook.chroot image/live/config/includes.chroot/etc/initramfs-tools/scripts/init-premount/sfp-loop image/live/config/includes.chroot/etc/initramfs-tools/hooks/sfp-loop"
sources = ["bin/sfp-unlock", "test/helpers.bash", "image/**/*.sh", "image/live/auto/config", "image/live/config/hooks/normal/*.hook.chroot"]

[tasks.shellcheck]
description = "Static analysis of shell scripts"
run = "shellcheck -x bin/sfp-unlock test/helpers.bash image/build-img.sh image/in-container-img.sh image/live/build-live.sh image/live/in-container-live.sh image/live/auto/config image/live/config/hooks/normal/0100-root-nopasswd.hook.chroot image/live/config/includes.chroot/etc/initramfs-tools/scripts/init-premount/sfp-loop image/live/config/includes.chroot/etc/initramfs-tools/hooks/sfp-loop"
sources = ["bin/sfp-unlock", "test/helpers.bash", "image/**/*.sh", "image/live/auto/config", "image/live/config/hooks/normal/*.hook.chroot"]

[tasks.lint]
description = "Run all linters"
depends = ["fmt-check", "shellcheck"]
run = "echo 'lint ok'"

[tasks.test]
description = "Run the bats test suite (no hardware)"
run = "bats --print-output-on-failure test/"
sources = ["bin/sfp-unlock", "test/**/*"]

[tasks.zizmor]
description = "Security-scan the GitHub Actions workflows"
run = "zizmor .github/workflows/"
sources = [".github/workflows/*.yml", ".github/workflows/*.yaml"]

[tasks.hooks]
description = "Install git hooks via lefthook"
run = "lefthook install"

[tasks.build]
description = "Build the live ISO + PXE artefacts with live-build (needs Docker)"
depends = ["lint"]
run = "image/live/build-live.sh"
sources = ["bin/sfp-unlock", "image/live/**/*"]
outputs = ["dist/sfp-unlocker.iso", "dist/pxe/initrd.img"]

[tasks.build-img]
description = "Build the mini non-bootable tools image (script + static ethtool, needs Docker)"
depends = ["lint"]
run = "image/build-img.sh dist/sfp-unlocker-tools.img"
sources = ["bin/sfp-unlock", "image/build-img.sh", "image/in-container-img.sh"]
outputs = ["dist/sfp-unlocker-tools.img"]

[tasks.ci]
description = "Everything CI runs (lint + test + zizmor)"
depends = ["lint", "test", "zizmor"]
run = "echo 'ci ok'"
