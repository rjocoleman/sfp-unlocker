# Git hooks. Install with: mise run hooks  (or: lefthook install)
# These call the mise tasks so the file lists live in one place (mise.toml) and
# can't drift out of sync with the hooks.

pre-commit:
  parallel: true
  commands:
    lint:
      run: mise run lint
    zizmor:
      glob: ".github/workflows/*.{yml,yaml}"
      run: mise run zizmor

pre-push:
  commands:
    test:
      run: mise run test
