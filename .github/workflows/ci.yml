name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
      - run: mise run lint
      - run: mise run test
      - run: mise run zizmor
        env:
          GH_TOKEN: ${{ github.token }}
      # Verify the pre-commit hooks pass against the whole tree.
      - run: lefthook run pre-commit --all-files

  build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
      # GitHub runners are x86_64 with Docker available, so the build is native.
      - run: mise run build # live-build: ISO + PXE
      - run: mise run build-img # mini tools image
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sfp-unlocker
          path: |
            dist/sfp-unlocker.iso
            dist/sfp-unlocker-tools.img
            dist/pxe/**
          if-no-files-found: error
