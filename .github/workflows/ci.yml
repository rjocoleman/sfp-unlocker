name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: mise run lint
      - run: mise run test
      # Verify the pre-commit hooks pass against the whole tree.
      - run: lefthook run pre-commit --all-files

  build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      # GitHub runners are x86_64 with Docker available, so the build is native.
      - run: TARGET_PLATFORM=linux/amd64 mise run build
      - run: mise run build-pxe
      - uses: actions/upload-artifact@v4
        with:
          name: sfp-unlocker
          path: |
            dist/sfp-unlocker.iso
            dist/pxe/**
          if-no-files-found: error
