name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.6 # pin: avoid a broken "latest" with missing release assets
      - run: mise run lint
      - run: mise run test
      - run: mise run zizmor
        env:
          GH_TOKEN: ${{ github.token }}
      # Verify the pre-commit hooks pass against the whole tree.
      - run: lefthook run pre-commit --all-files

  build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.6 # pin: avoid a broken "latest" with missing release assets
      # GitHub runners are x86_64 with Docker available, so the build is native.
      - run: mise run build # live-build: ISO + PXE
      - run: mise run build-img # mini tools image
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sfp-unlocker
          path: |
            dist/sfp-unlocker.iso
            dist/sfp-unlocker-tools.img
            dist/pxe/**
          if-no-files-found: error
