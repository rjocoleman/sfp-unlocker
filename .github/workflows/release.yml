name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release and upload assets
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          cache: false # publish workflow: avoid cache poisoning of release artefacts

      - run: mise run lint
      - run: mise run test
      - run: mise run zizmor
        env:
          GH_TOKEN: ${{ github.token }}

      - run: mise run build
      - run: mise run build-pxe
      - run: mise run build-img

      - name: Stage release assets
        run: |
          set -eu
          mkdir -p release
          cp dist/sfp-unlocker.iso release/
          cp dist/sfp-unlocker-tools.img release/
          # PXE files individually so iPXE's releases/latest/download URLs resolve.
          cp dist/pxe/vmlinuz-lts dist/pxe/initramfs-lts dist/pxe/modloop-lts release/
          cp dist/pxe/sfp-unlocker.apkovl.tar.gz release/
          cp dist/pxe/sfp.ipxe dist/pxe/netboot.xyz-custom.ipxe release/
          tar -czf release/sfp-unlocker-pxe.tar.gz -C dist/pxe .
          # Checksums (written to parent first so the file does not list itself).
          ( cd release && sha256sum -- * >../SHA256SUMS && mv ../SHA256SUMS . )
          ls -l release

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes release/*
