name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release and upload assets
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.6 # pin: avoid a broken "latest" with missing release assets
          cache: false # publish workflow: avoid cache poisoning of release artefacts

      - run: mise run lint
      - run: mise run test
      - run: mise run zizmor
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Stamp tool version from tag
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          # Strip the leading "v" (v1.1.3 -> 1.1.3) and bake it in before the
          # image builds copy the script, so the shipped binary matches the tag.
          sed -i "s/^VERSION=.*/VERSION=${VERSION#v}/" bin/sfp-unlock
          grep -n '^VERSION=' bin/sfp-unlock

      - run: mise run build # live-build: ISO + PXE (kernel/initrd/squashfs)
      - run: mise run build-img # mini mount-and-run tools image

      - name: Stage release assets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          mkdir -p release
          cp dist/sfp-unlocker.iso release/
          cp dist/sfp-unlocker-tools.img release/
          # PXE files individually so the iPXE releases/latest/download URLs resolve.
          # The rootfs is the ISO (iPXE loads it; an init hook loop-mounts it),
          # so only the kernel and initrd are needed alongside it for netboot.
          cp dist/pxe/vmlinuz dist/pxe/initrd.img release/
          sed "s/^set version .*/set version ${VERSION}/" image/netboot/sfp.ipxe >release/sfp.ipxe
          cp image/netboot/netboot.xyz-custom.ipxe release/
          # Checksums (written to parent first so the file does not list itself).
          ( cd release && sha256sum -- * >../SHA256SUMS && mv ../SHA256SUMS . )
          ls -l release

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes release/*
